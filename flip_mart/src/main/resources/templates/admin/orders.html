<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Orders')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('admin')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  <section class="container py-5"><div class="sidebar-layout"><aside class="card side-nav"><a th:href="@{/admin/}">Overview</a><a th:href="@{/admin/category}">Categories</a><a th:href="@{/admin/loadAddProduct}">Add product</a><a th:href="@{/admin/products}">Products</a><a th:href="@{/admin/orders}">Orders</a><a th:href="@{/admin/users(type=1)}">Users</a><a th:href="@{/admin/add-admin}">Add admin</a><a th:href="@{/admin/profile}">Profile</a></aside><main><div class="section-title"><h1>Orders</h1></div><div class="card"><form th:action="@{/admin/search-order}" method="get" class="toolbar"><div class="field" style="flex:1;"><label>Search by order ID</label><input name="orderId"></div><div style="display:flex;align-items:end;"><button class="btn" type="submit">Search</button></div></form><div th:if="${srch and orderDtls != null}" class="mt-4"><div class="metric"><div class="text-muted">Order found</div><strong th:text="${orderDtls.orderId}"></strong><div th:text="${orderDtls.product.title}"></div></div></div><div class="table-wrap mt-4" th:if="${!srch}"><table class="table"><thead><tr><th>Order ID</th><th>Customer</th><th>Product</th><th>Status</th><th>Payment</th></tr></thead><tbody><tr th:each="o : ${orders}"><td th:text="${o.orderId}"></td><td th:text="${o.user.name}"></td><td th:text="${o.product.title}"></td><td><span class="badge" th:text="${o.status}"></span></td><td th:text="${o.paymentType}"></td></tr></tbody></table></div></div></main></div></section>
  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Edit category')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('admin')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  <section class="container py-5"><div class="sidebar-layout"><aside class="card side-nav"><a th:href="@{/admin/}">Overview</a><a th:href="@{/admin/category}">Categories</a><a th:href="@{/admin/loadAddProduct}">Add product</a><a th:href="@{/admin/products}">Products</a><a th:href="@{/admin/orders}">Orders</a><a th:href="@{/admin/users(type=1)}">Users</a><a th:href="@{/admin/add-admin}">Add admin</a><a th:href="@{/admin/profile}">Profile</a></aside><main><div class="card form-card"><div class="section-title"><h1>Edit category</h1></div><form th:action="@{/admin/updateCategory}" method="post" enctype="multipart/form-data"><input type="hidden" name="id" th:value="${category.id}"><div class="form-grid"><div class="field"><label>Name</label><input name="name" th:value="${category.name}"></div><div class="field"><label>Status</label><select name="isActive"><option value="true" th:selected="${category.isActive}">Active</option><option value="false" th:selected="${!category.isActive}">Inactive</option></select></div><div class="field"><label>Replace image</label><input type="file" name="file"></div></div><button class="btn mt-4" type="submit">Update category</button></form></div></main></div></section>
  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

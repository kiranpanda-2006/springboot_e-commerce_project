<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Admin profile')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('admin')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  <section class="container py-5"><div class="sidebar-layout"><aside class="card side-nav"><a th:href="@{/admin/}">Overview</a><a th:href="@{/admin/category}">Categories</a><a th:href="@{/admin/loadAddProduct}">Add product</a><a th:href="@{/admin/products}">Products</a><a th:href="@{/admin/orders}">Orders</a><a th:href="@{/admin/users(type=1)}">Users</a><a th:href="@{/admin/add-admin}">Add admin</a><a th:href="@{/admin/profile}">Profile</a></aside><main><div class="section-title"><h1>Admin profile</h1></div><div class="grid grid-2" style="align-items:start;"><div class="card form-card"><form th:action="@{/admin/update-profile}" method="post" enctype="multipart/form-data"><input type="hidden" name="id" th:value="${user.id}"><input type="hidden" name="role" th:value="${user.role}"><div class="form-grid"><div class="field"><label>Name</label><input name="name" th:value="${user.name}"></div><div class="field"><label>Email</label><input name="email" th:value="${user.email}" readonly></div><div class="field"><label>Mobile</label><input name="mobileNumber" th:value="${user.mobileNumber}"></div><div class="field"><label>Address</label><input name="address" th:value="${user.address}"></div><div class="field"><label>City</label><input name="city" th:value="${user.city}"></div><div class="field"><label>State</label><input name="state" th:value="${user.state}"></div><div class="field"><label>Pincode</label><input name="pincode" th:value="${user.pincode}"></div><div class="field"><label>Profile image</label><input type="file" name="img"></div></div><button class="btn mt-4" type="submit">Save profile</button></form></div><div class="card form-card"><h2>Change password</h2><form th:action="@{/admin/change-password}" method="post" class="mt-3"><div class="field"><label>Current password</label><input type="password" name="currentPassword" required></div><div class="field mt-3"><label>New password</label><input type="password" name="newPassword" required></div><button class="btn mt-4" type="submit">Update password</button></form></div></div></main></div></section>
  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

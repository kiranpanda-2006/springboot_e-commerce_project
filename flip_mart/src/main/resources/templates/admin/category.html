<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Categories')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('admin')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  <section class="container py-5"><div class="sidebar-layout"><aside class="card side-nav"><a th:href="@{/admin/}">Overview</a><a th:href="@{/admin/category}">Categories</a><a th:href="@{/admin/loadAddProduct}">Add product</a><a th:href="@{/admin/products}">Products</a><a th:href="@{/admin/orders}">Orders</a><a th:href="@{/admin/users(type=1)}">Users</a><a th:href="@{/admin/add-admin}">Add admin</a><a th:href="@{/admin/profile}">Profile</a></aside><main><div class="section-title"><h1>Categories</h1></div><div class="grid grid-2" style="align-items:start;"><div class="card form-card"><h2>Add category</h2><form th:action="@{/admin/saveCategory}" method="post" enctype="multipart/form-data" class="mt-3"><div class="field"><label>Name</label><input name="name" required></div><div class="field mt-3"><label>Image</label><input type="file" name="file" required></div><div class="field mt-3"><label>Status</label><select name="isActive"><option value="true">Active</option><option value="false">Inactive</option></select></div><button class="btn mt-4" type="submit">Save category</button></form></div><div class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Name</th><th>Status</th><th>Image</th><th>Actions</th></tr></thead><tbody><tr th:each="c : ${categorys}"><td th:text="${c.name}"></td><td th:text="${c.isActive} ? 'Active' : 'Inactive'"></td><td><img th:src="@{'/img/category_img/' + ${c.imageName}}" style="width:52px;height:52px;border-radius:14px;object-fit:cover;"></td><td style="display:flex;gap:8px;flex-wrap:wrap;"><a class="page-link" th:href="@{'/admin/loadEditCategory/' + ${c.id}}">Edit</a><a class="page-link" data-confirm="Delete this category?" th:href="@{'/admin/deleteCategory/' + ${c.id}}">Delete</a></td></tr></tbody></table></div></div></div></main></div></section>
  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Register')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('auth')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  
<section class="container py-5">
  <div class="card form-card">
    <div class="section-title"><h1>Create your account</h1><span class="badge"><i class="fa-solid fa-user-plus"></i> Register</span></div>
    <form th:action="@{/saveUser}" method="post" enctype="multipart/form-data">
      <div class="form-grid">
        <div class="field"><label>Full name</label><input name="name" required></div>
        <div class="field"><label>Email</label><input type="email" name="email" required></div>
        <div class="field"><label>Mobile number</label><input name="mobileNumber" required></div>
        <div class="field"><label>Password</label><input type="password" name="password" required></div>
        <div class="field"><label>Address</label><input name="address"></div>
        <div class="field"><label>City</label><input name="city"></div>
        <div class="field"><label>State</label><input name="state"></div>
        <div class="field"><label>Pincode</label><input name="pincode"></div>
        <div class="field"><label>Profile image</label><input type="file" name="img" accept="image/*"></div>
      </div>
      <div class="mt-4" style="display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;">
        <a class="btn btn-outline" th:href="@{/signin}">Already have account?</a>
        <button class="btn" type="submit">Create account</button>
      </div>
    </form>
  </div>
</section>

  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Forgot password')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('auth')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  
<section class="container py-5"><div class="card form-card" style="max-width:620px;margin:auto;">
<h1>Forgot password</h1><p class="text-muted">Enter your registered email. Your backend will send the reset link.</p>
<form th:action="@{/forgot-password}" method="post" class="mt-4"><div class="field"><label>Email</label><input type="email" name="email" required></div><button class="btn mt-4" type="submit">Send reset link</button></form>
</div></section>

  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

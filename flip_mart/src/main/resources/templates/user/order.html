<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Checkout')}"></head>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('user')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>

  <section class="container py-5">
    <div class="sidebar-layout">
      <aside class="card side-nav">
        <a th:href="@{/user/}">Dashboard</a>
        <a th:href="@{/user/cart}">My Cart</a>
        <a th:href="@{/user/orders}">Checkout</a>
        <a th:href="@{/user/user-orders}">My Orders</a>
        <a th:href="@{/user/profile}">Profile</a>
      </aside>

      <main>
        <div class="section-title">
          <h1>Checkout</h1>
          <span class="badge"><i class="fa-solid fa-lock"></i> Secure payment</span>
        </div>

        <div class="grid grid-2" style="align-items:start;">
          <div class="card form-card">
            <form th:action="@{/user/save-order}" method="post" id="orderForm">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

              <div class="form-grid">
                <div class="field">
                  <label>First name</label>
                  <input name="firstName" required>
                </div>
                <div class="field">
                  <label>Last name</label>
                  <input name="lastName" required>
                </div>
                <div class="field">
                  <label>Email</label>
                  <input type="email" name="email" required>
                </div>
                <div class="field">
                  <label>Mobile</label>
                  <input name="mobileNo" required>
                </div>
                <div class="field">
                  <label>Address</label>
                  <input name="address" required>
                </div>
                <div class="field">
                  <label>City</label>
                  <input name="city" required>
                </div>
                <div class="field">
                  <label>State</label>
                  <input name="state" required>
                </div>
                <div class="field">
                  <label>Pincode</label>
                  <input name="pincode" required>
                </div>
                <div class="field">
                  <label>Payment type</label>
                  <select name="paymentType" id="paymentType">
                    <option value="COD">Cash on delivery</option>
                    <option value="ONLINE">Online payment</option>
                  </select>
                </div>
              </div>

              <input type="hidden" name="razorpayOrderId" id="razorpayOrderId">
              <input type="hidden" name="razorpayPaymentId" id="razorpayPaymentId">
              <input type="hidden" name="razorpaySignature" id="razorpaySignature">

              <button class="btn mt-4" type="submit" id="placeOrderBtn">Place order</button>
            </form>
          </div>

          <div class="card summary-card">
            <h2>Payment summary</h2>
            <div class="table-wrap mt-3">
              <table class="table">
                <tr>
                  <td>Items</td>
                  <td>₹<span th:text="${orderPrice != null ? orderPrice : 0}"></span></td>
                </tr>
                <tr>
                  <td>Delivery</td>
                  <td>₹250</td>
                </tr>
                <tr>
                  <td>Platform fee</td>
                  <td>₹100</td>
                </tr>
                <tr>
                  <th>Total</th>
                  <th>₹<span th:text="${totalOrderPrice != null ? totalOrderPrice : 0}"></span></th>
                </tr>
              </table>
            </div>
            <p class="text-muted">
              Razorpay popup is supported by your backend endpoint
              <code>/user/create-razorpay-order</code>.
            </p>
          </div>
        </div>
      </main>
    </div>
  </section>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script th:inline="javascript">
    /*<![CDATA[*/
    const razorpayEnabled = /*[[${razorpayEnabled}]]*/ false;
    const keyId = /*[[${razorpayKeyId}]]*/ "";
    const companyName = /*[[${razorpayCompanyName}]]*/ "";
    const createOrderUrl = /*[[@{/user/create-razorpay-order}]]*/ '/user/create-razorpay-order';

    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const csrfToken = /*[[${_csrf.token}]]*/ '';

    const orderForm = document.getElementById('orderForm');
    const paymentType = document.getElementById('paymentType');

    orderForm?.addEventListener('submit', async function (e) {
      if (paymentType.value !== 'ONLINE' || !razorpayEnabled) {
        return;
      }

      e.preventDefault();

      try {
        const resp = await fetch(createOrderUrl, {
          method: 'POST',
          headers: {
            [csrfHeader]: csrfToken
          }
        });

        const data = await resp.json();

        if (!resp.ok) {
          alert(data.message || 'Unable to start payment');
          return;
        }

        const options = {
          key: data.key || keyId,
          amount: data.amount,
          currency: data.currency,
          name: data.name || companyName,
          order_id: data.id,
          prefill: {
            email: data.email,
            contact: data.contact
          },
          handler: function (response) {
            document.getElementById('razorpayOrderId').value = response.razorpay_order_id;
            document.getElementById('razorpayPaymentId').value = response.razorpay_payment_id;
            document.getElementById('razorpaySignature').value = response.razorpay_signature;
            orderForm.submit();
          }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (err) {
        alert('Unable to start payment');
        console.error(err);
      }
    });
    /*]]>*/
  </script>

  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

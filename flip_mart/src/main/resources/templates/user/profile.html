<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Profile')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('user')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  <section class="container py-5"><div class="sidebar-layout"><aside class="card side-nav"><a th:href="@{/user/}">Dashboard</a><a th:href="@{/user/cart}">My Cart</a><a th:href="@{/user/orders}">Checkout</a><a th:href="@{/user/user-orders}">My Orders</a><a th:href="@{/user/profile}">Profile</a></aside><main><div class="section-title"><h1>My profile</h1></div><div class="grid grid-2" style="align-items:start;"><div class="card form-card"><form th:action="@{/user/update-profile}" method="post" enctype="multipart/form-data"><input type="hidden" name="id" th:value="${user.id}"><input type="hidden" name="role" th:value="${user.role}"><div class="form-grid"><div class="field"><label>Name</label><input name="name" th:value="${user.name}"></div><div class="field"><label>Email</label><input name="email" th:value="${user.email}" readonly></div><div class="field"><label>Mobile</label><input name="mobileNumber" th:value="${user.mobileNumber}"></div><div class="field"><label>Address</label><input name="address" th:value="${user.address}"></div><div class="field"><label>City</label><input name="city" th:value="${user.city}"></div><div class="field"><label>State</label><input name="state" th:value="${user.state}"></div><div class="field"><label>Pincode</label><input name="pincode" th:value="${user.pincode}"></div><div class="field"><label>Profile image</label><input type="file" name="img" accept="image/*" data-image-preview-input></div></div><button class="btn mt-4" type="submit">Save profile</button></form></div><div class="card form-card"><img th:src="${user.profileImage != null} ? @{'/img/profile_img/' + ${user.profileImage}} : @{'/img/default.jpg'}" data-image-preview style="width:120px;height:120px;border-radius:24px;object-fit:cover;margin-bottom:18px;"><h2>Change password</h2><form th:action="@{/user/change-password}" method="post" class="mt-3"><div class="field"><label>Current password</label><input type="password" name="currentPassword" required></div><div class="field mt-3"><label>New password</label><input type="password" name="newPassword" required></div><button class="btn mt-4" type="submit">Update password</button></form></div></div></main></div></section>
  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

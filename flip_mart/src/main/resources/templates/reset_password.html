<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/head :: head('Reset password')}"></th:block>
<body>
  <th:block th:replace="~{fragments/navbar :: navbar('auth')}"></th:block>
  <th:block th:replace="~{fragments/alerts :: alerts}"></th:block>
  
<section class="container py-5"><div class="card form-card" style="max-width:620px;margin:auto;">
<h1>Reset password</h1><p class="text-muted">Choose a new password for your account.</p>
<form th:action="@{/reset-password}" method="post" class="mt-4">
<input type="hidden" name="token" th:value="${token}">
<div class="field"><label>New password</label><input type="password" name="password" required></div>
<button class="btn mt-4" type="submit">Update password</button></form>
</div></section>

  <th:block th:replace="~{fragments/footer :: footer}"></th:block>
  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
